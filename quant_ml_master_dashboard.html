<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-white font-sans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant ML Master Dashboard v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        /* Custom scrollbar for a sleek dark mode feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans overflow-hidden h-screen flex">

    <!-- Sidebar Navigation -->
    <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col h-full flex-shrink-0 shadow-2xl z-10">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-2xl font-extrabold tracking-tight text-cyan-400">⚡ Quant ML</h1>
            <p class="text-gray-500 text-xs mt-1 uppercase tracking-wider">Master Dashboard v5.1</p>
        </div>
        
        <!-- Asset Selectors -->
        <div class="p-6 border-b border-gray-800 space-y-4 bg-gray-900/50">
            <div>
                <label class="text-xs text-gray-400 mb-2 block font-semibold tracking-wide uppercase">Asset Class</label>
                <select id="assetClass" onchange="loadAssets()" class="w-full bg-gray-950 border border-gray-700 px-3 py-2.5 rounded-lg text-sm focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors">
                    <option value="equities">Indian Equities</option>
                    <option value="crypto">Crypto Network</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-gray-400 mb-2 block font-semibold tracking-wide uppercase">Primary Asset</label>
                <select id="primaryAsset" onchange="refreshDashboard()" class="w-full bg-gray-950 border border-gray-700 px-3 py-2.5 rounded-lg text-sm focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors">
                    <!-- Loaded via JS -->
                </select>
            </div>
        </div>

        <!-- Navigation Menu -->
        <div class="p-4">
            <label class="text-xs text-gray-500 mb-2 block font-semibold tracking-wide uppercase px-2">Analysis Tools</label>
        </div>
        <nav id="navMenu" class="flex-1 overflow-y-auto pb-6">
            <!-- Buttons dynamically generated by JS -->
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full overflow-y-auto p-8 relative bg-gray-950">
        <div id="toolContainer" class="max-w-6xl mx-auto">
            <!-- JavaScript will inject the active tool's view here -->
            <div class="flex items-center justify-center h-64">
                <div class="text-gray-500 flex flex-col items-center">
                    <svg class="animate-spin h-8 w-8 mb-4 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span>Connecting to backend engines...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Frontend Application Logic -->
    <script>
        const API_BASE = "http://127.0.0.1:8000/api";
        let globalData = null;
        let currentTool = 'synthesis'; // Default view

        // Define the tool navigation structure
        const tools = [
            { id: 'synthesis', name: '9. Market Synthesis (Overview)' },
            { id: 'ivr', name: '1. IVR & IVP' },
            { id: 'em', name: '2. Expected Move' },
            { id: 'div', name: '3. Index Divergence' },
            { id: 'cone', name: '4. Volatility Cone' },
            { id: 'vrp', name: '5. Volatility Risk Premium' },
            { id: 'hurst', name: '6. Hurst Regime' },
            { id: 'liq', name: '7. Liquidity Sweeps' },
            { id: 'yz', name: '8. Advanced Volatility (YZ)' }
        ];

        // 1. Initialize the sidebar navigation
        function initNav() {
            const nav = document.getElementById('navMenu');
            nav.innerHTML = tools.map(t => `
                <button onclick="setTool('${t.id}')" 
                    class="w-full text-left px-6 py-3 text-sm transition-colors border-l-4 ${t.id === currentTool ? 'bg-gray-800/80 border-cyan-400 text-cyan-400 font-bold' : 'border-transparent text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}">
                    ${t.name}
                </button>
            `).join('');
        }

        // 2. Handle Tool Switching
        function setTool(id) {
            currentTool = id;
            initNav(); // Re-render nav to update active highlights
            renderToolView(); // Render the main content area
        }

        // 3. Fetch Asset Lists from Backend
        async function loadAssets() {
            const assetClass = document.getElementById("assetClass").value;
            try {
                const res = await fetch(`${API_BASE}/assets?asset_class=${assetClass}`);
                const data = await res.json();
                
                const dropdown = document.getElementById("primaryAsset");
                dropdown.innerHTML = "";
                data.assets.forEach(asset => {
                    let opt = document.createElement("option");
                    opt.value = asset; opt.innerText = asset;
                    dropdown.appendChild(opt);
                });
                refreshDashboard();
            } catch (err) {
                document.getElementById("toolContainer").innerHTML = `
                    <div class="p-6 bg-red-900/20 border border-red-800 rounded-lg text-red-400 max-w-2xl mx-auto mt-10 shadow-xl">
                        <h3 class="font-bold text-xl mb-2 flex items-center">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            Backend Connection Error
                        </h3>
                        <p class="mb-4">Could not connect to the Python backend on <code>http://127.0.0.1:8000</code>.</p>
                        <p class="text-sm opacity-80">Make sure your command prompt is running:</p>
                        <code class="block bg-black p-3 mt-2 rounded border border-red-900">python main.py</code>
                    </div>`;
            }
        }

        // 4. Fetch the heavy quantitative data from the backend
        async function refreshDashboard() {
            const assetClass = document.getElementById("assetClass").value;
            const assetName = document.getElementById("primaryAsset").value;
            if(!assetName) return;

            document.getElementById("toolContainer").innerHTML = `
                <div class="flex flex-col items-center justify-center h-64 text-gray-500">
                    <svg class="animate-spin h-10 w-10 mb-4 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span class="text-lg">Calculating deep historical models...</span>
                    <span class="text-sm opacity-60 mt-2">Fetching live data from Yahoo Finance</span>
                </div>`;

            try {
                const res = await fetch(`${API_BASE}/synthesis?asset_class=${assetClass}&asset_name=${encodeURIComponent(assetName)}`);
                if(!res.ok) throw new Error("API Data Error");
                globalData = await res.json();
                renderToolView();
            } catch (err) {
                document.getElementById("toolContainer").innerHTML = `
                    <div class="p-6 bg-red-900/20 border border-red-800 rounded-lg text-red-400 max-w-2xl mx-auto mt-10 shadow-xl">
                        <h3 class="font-bold text-xl mb-2">Data Calculation Failed</h3>
                        <p>The backend encountered an error while pulling or processing the data for ${assetName}.</p>
                    </div>`;
            }
        }

        // 5. Dynamic Single-Page-Application Router
        function renderToolView() {
            const container = document.getElementById('toolContainer');
            if (!globalData) return;

            const s = globalData.scores;
            const m = globalData.meta;
            const assetClass = document.getElementById("assetClass").value;
            const spotStr = `${m.currency}${m.spot.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // --- VIEW: 9. SYNTHESIS (OVERVIEW) ---
            if (currentTool === 'synthesis') {
                container.innerHTML = `
                    <div class="p-5 rounded-xl bg-blue-950/30 border border-blue-900/50 text-sm mb-8 shadow-lg">
                        <strong>Actionable Insight:</strong> The market is currently in a <strong>${s.macro_state}</strong> state. The optimal derivatives configuration favors: <span class="text-cyan-400 font-bold">${s.option_strategy}</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <h3 class="text-gray-500 font-bold mb-4 tracking-wider text-xs uppercase">1. Volatility & Pricing</h3>
                            <div class="space-y-5">
                                <div><span class="text-sm text-gray-400 block mb-1">IV Rank</span><div class="text-3xl font-extrabold">${s.ivr}%</div></div>
                                <div><span class="text-sm text-gray-400 block mb-1">VRP Edge</span><div class="text-2xl font-bold ${s.vrp > 0 ? 'text-green-400' : 'text-red-400'}">${s.vrp > 0 ? '+' : ''}${s.vrp}%</div></div>
                            </div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <h3 class="text-gray-500 font-bold mb-4 tracking-wider text-xs uppercase">2. Market Behavior</h3>
                            <div class="space-y-5">
                                <div><span class="text-sm text-gray-400 block mb-1">Hurst Exponent</span><div class="text-3xl font-extrabold">${s.hurst}</div><div class="text-xs text-cyan-400 mt-1">${s.hurst_regime}</div></div>
                                <div><span class="text-sm text-gray-400 block mb-1">Intraday Flow</span><div class="text-lg font-bold text-yellow-400">${s.liq_regime}</div></div>
                            </div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <h3 class="text-gray-500 font-bold mb-4 tracking-wider text-xs uppercase">3. Systemic Risk</h3>
                            <div class="space-y-5">
                                <div><span class="text-sm text-gray-400 block mb-1">Structural Vol (YZ)</span><div class="text-3xl font-extrabold text-emerald-400">${s.yz_vol}%</div></div>
                                <div><span class="text-sm text-gray-400 block mb-1">Systemic Correlation</span><div class="text-2xl font-bold">${s.correlation}</div><div class="text-xs text-gray-500 mt-1">${s.div_regime}</div></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-xl lg:col-span-2">
                            <div id="mainChart" class="w-full h-[350px]"></div>
                        </div>
                        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-xl flex justify-center items-center">
                            <div id="radarChart" class="w-full h-[350px]"></div>
                        </div>
                    </div>

                    <section class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl mb-8">
                        <h2 class="text-xl font-bold text-cyan-400 mb-4 tracking-tight border-b border-gray-800 pb-2">📝 AI Daily Market Analysis</h2>
                        <div id="analysisText" class="text-gray-300 leading-relaxed space-y-4 text-sm"></div>
                    </section>
                `;

                // Render Synthesis Charts
                const trace = { x: globalData.chart_data.dates, y: globalData.chart_data.prices, type: 'scatter', mode: 'lines', line: { color: '#67e8f9', width: 2 } };
                Plotly.newPlot('mainChart', [trace], { title: `${m.asset_name} History (Spot: ${spotStr})`, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: { color: '#9ca3af' }, xaxis: { gridcolor: '#1f2937' }, yaxis: { gridcolor: '#1f2937' }, margin: { l: 40, r: 20, t: 40, b: 30 } });

                const norm_ivr = Math.min(s.ivr / 100, 1.0);
                const norm_hurst = Math.min(s.hurst, 1.0);
                const norm_corr = Math.max(0, Math.min(s.correlation, 1.0));
                const norm_vrp = Math.max(0, Math.min((s.vrp + 5) / 10, 1.0)); 
                Plotly.newPlot('radarChart', [{ type: 'scatterpolar', r: [norm_ivr, norm_hurst, norm_corr, norm_vrp, norm_ivr], theta: ['IV Rank', 'Trend (Hurst)', 'Correlation', 'VRP Premium', 'IV Rank'], fill: 'toself', line: { color: '#67e8f9' } }], { polar: { radialaxis: { visible: false, range: [0, 1] }, angularaxis: { tickfont: { color: '#9ca3af' } }, bgcolor: 'rgba(0,0,0,0)' }, showlegend: false, paper_bgcolor: 'rgba(0,0,0,0)', font: { color: '#9ca3af' }, margin: { l: 40, r: 40, t: 20, b: 20 } });

                // Analysis Text
                const divText = s.correlation > 0.5 ? "Sectors are moving symmetrically, confirming broader trend validation rules." : "The tracking pairs are moving independently. This structural decoupling warns of increased micro-structure friction.";
                const volText = `The benchmark volatility is reading at ${s.current_vix}, pinning the overall IV Rank at ${s.ivr}%. ${s.vrp > 0 ? `With a positive Volatility Risk Premium (+${s.vrp}%), option premium is mathematically rich.` : `A negative VRP (${s.vrp}%) reveals underpriced premium variables, favoring directional breakout strategies.`}`;
                
                document.getElementById("analysisText").innerHTML = `
                    <p><strong>Systemic Risk Framework:</strong> Systemic correlation evaluates to ${s.correlation}. ${divText}</p>
                    <p><strong>Volatility Pricing Matrix:</strong> ${volText}</p>
                    <p><strong>Structural Regime:</strong> The Hurst component indexes at ${s.hurst} marking a ${s.hurst_regime} condition. Breakout configurations are ${s.hurst_regime === 'TRENDING' ? 'expected to carry momentum.' : 'statistically favored to mean-revert.'}</p>
                    <p><strong>Intraday Market State:</strong> Order flow execution flags a state of <strong>${s.liq_regime}</strong>.</p>
                    <div class="p-3 bg-gray-800 rounded mt-4 border-l-4 border-cyan-400 text-xs text-cyan-100 font-mono">
                        CONCLUSION PROTOCOL: Systemic Bias dictates a [${s.macro_state.toUpperCase()}] posture. Optimization recommends executing [${s.option_strategy}].
                    </div>
                `;
            }

            // --- VIEW: 1. IVR & IVP ---
            else if (currentTool === 'ivr') {
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Implied Volatility Rank (IVR)</h2>
                    <p class="text-gray-400 mb-8">Evaluates current premium pricing relative to the asset's 52-week historical range.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl text-center flex flex-col justify-center">
                            <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-wider">IV Rank</div>
                            <div class="text-5xl font-extrabold text-cyan-400">${s.ivr}%</div>
                        </div>
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl text-center flex flex-col justify-center">
                            <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-wider">Vol Benchmark (VIX)</div>
                            <div class="text-4xl font-bold text-white">${s.current_vix}</div>
                        </div>
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl text-center flex flex-col justify-center">
                            <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-wider">Strategy Bias</div>
                            <div class="text-xl font-bold text-white mt-4">${s.option_strategy}</div>
                        </div>
                    </div>
                `;
            }

            // --- VIEW: 2. EXPECTED MOVE ---
            else if (currentTool === 'em') {
                let days = assetClass === 'equities' ? 252 : 365;
                let daily_vol = (s.current_vix / 100) * Math.sqrt(1 / days);
                let exp_move = m.spot * daily_vol;

                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Daily Expected Move (1σ)</h2>
                    <p class="text-gray-400 mb-8">Calculates the 68% probability boundaries for tomorrow's price action based on current volatility.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">Spot Price</div>
                            <div class="text-3xl font-bold text-white">${spotStr}</div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">Expected Move</div>
                            <div class="text-3xl font-bold text-cyan-400">± ${m.currency}${exp_move.toFixed(2)}</div>
                            <div class="text-sm text-gray-500 mt-1">${(daily_vol*100).toFixed(2)}% boundary</div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">Upper / Lower Targets</div>
                            <div class="text-lg font-bold text-green-400 mb-1">Upper: ${m.currency}${(m.spot + exp_move).toFixed(2)}</div>
                            <div class="text-lg font-bold text-red-400">Lower: ${m.currency}${(m.spot - exp_move).toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-xl"><div id="emChart" class="w-full h-[450px]"></div></div>
                `;

                const rDates = globalData.chart_data.dates.slice(-30);
                const rPrices = globalData.chart_data.prices.slice(-30);
                const tomorrow = new Date(rDates[rDates.length-1]);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tStr = tomorrow.toISOString().split('T')[0];

                const t1 = { x: rDates, y: rPrices, type: 'scatter', mode: 'lines+markers', name: m.asset_name, line: {color: '#67e8f9'} };
                const t2 = { x: [rDates[rDates.length-1], tStr], y: [m.spot, m.spot], type: 'scatter', mode: 'lines', name: 'Spot', line: {color: 'white', dash: 'dash'} };
                const t3 = { x: [tStr], y: [m.spot + exp_move], type: 'scatter', mode: 'markers', name: 'Upper (+1σ)', marker: {color: '#22c55e', size: 16, symbol: 'triangle-up'} };
                const t4 = { x: [tStr], y: [m.spot - exp_move], type: 'scatter', mode: 'markers', name: 'Lower (-1σ)', marker: {color: '#ef4444', size: 16, symbol: 'triangle-down'} };

                Plotly.newPlot('emChart', [t1, t2, t3, t4], { title: '1-Day Expected Move Projection', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: {color: '#9ca3af'}, xaxis: {gridcolor: '#1f2937'}, yaxis: {gridcolor: '#1f2937'} });
            }

            // --- VIEW: 3. INDEX DIVERGENCE ---
            else if (currentTool === 'div') {
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Systemic Divergence</h2>
                    <p class="text-gray-400 mb-8">Tracks the 20-day rolling correlation between primary sector indices. Breakdowns warn of choppy action.</p>
                    
                    <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl max-w-lg mb-8">
                        <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-wider">20-Day Systemic Correlation</div>
                        <div class="text-5xl font-extrabold text-white mb-2">${s.correlation}</div>
                        <div class="text-lg font-bold ${s.correlation > 0.5 ? 'text-green-400' : 'text-red-400'}">${s.div_regime}</div>
                    </div>
                `;
            }

            // --- VIEW: 4. VOLATILITY CONE / 8. ADVANCED VOL ---
            else if (currentTool === 'cone' || currentTool === 'yz') {
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Structural Realized Volatility</h2>
                    <p class="text-gray-400 mb-8">Compares advanced Yang-Zhang gap volatility against standard close-to-close metrics.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-2 font-bold uppercase tracking-wider">Yang-Zhang Volatility (Gap + Intraday)</div>
                            <div class="text-4xl font-extrabold text-emerald-400">${s.yz_vol}%</div>
                            <p class="text-sm text-gray-500 mt-4">The true realized risk, accounting for overnight gaps.</p>
                        </div>
                        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-2 font-bold uppercase tracking-wider">Close-to-Close Volatility</div>
                            <div class="text-4xl font-extrabold text-gray-300">${s.c2c_vol}%</div>
                            <p class="text-sm text-gray-500 mt-4">Standard historical calculation. Often understates actual risk exposure.</p>
                        </div>
                    </div>
                    <div class="p-4 rounded-xl bg-blue-950/30 border border-blue-900/50 text-sm">
                        <strong>Difference (Hidden Risk):</strong> ${(s.yz_vol - s.c2c_vol).toFixed(2)}%
                    </div>
                `;
            }

            // --- VIEW: 5. VOLATILITY RISK PREMIUM ---
            else if (currentTool === 'vrp') {
                const realizedVol = (s.current_vix - s.vrp).toFixed(2);
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Volatility Risk Premium (VRP)</h2>
                    <p class="text-gray-400 mb-8">Measures the spread between Implied Volatility (Expectation) and Realized Volatility (Reality).</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">Implied Vol (VIX)</div>
                            <div class="text-3xl font-bold text-white">${s.current_vix}</div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">Realized Vol (20D HV)</div>
                            <div class="text-3xl font-bold text-gray-400">${realizedVol}</div>
                        </div>
                        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                            <div class="text-gray-400 text-xs mb-1 font-bold uppercase tracking-wider">VRP Spread</div>
                            <div class="text-3xl font-bold ${s.vrp > 0 ? 'text-green-400' : 'text-red-400'}">${s.vrp > 0 ? '+' : ''}${s.vrp}%</div>
                        </div>
                    </div>
                    <div class="p-5 rounded-xl bg-gray-800/50 border border-gray-700 text-sm shadow-inner">
                        <strong>Analysis:</strong> ${s.vrp > 0 ? 'Implied Volatility is overstating reality. Options sellers possess a mathematical edge.' : 'Realized Volatility is exceeding Implied estimates. Options are underpriced, favoring buyers.'}
                    </div>
                `;
            }

            // --- VIEW: 6. HURST REGIME ---
            else if (currentTool === 'hurst') {
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Hurst Exponent Regime</h2>
                    <p class="text-gray-400 mb-8">A quantitative measure of auto-correlation determining if the market is trending or mean-reverting.</p>
                    
                    <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl max-w-lg mb-8 text-center mx-auto">
                        <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-wider">Hurst Value</div>
                        <div class="text-5xl font-extrabold text-cyan-400 mb-2">${s.hurst}</div>
                        <div class="text-xl text-white font-bold tracking-wide">${s.hurst_regime}</div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-xl"><div id="hurstChart" class="w-full h-[350px]"></div></div>
                `;
                const t = { x: globalData.chart_data.dates, y: globalData.chart_data.prices, type: 'scatter', mode: 'lines', line: { color: '#67e8f9', width: 2 } };
                Plotly.newPlot('hurstChart', [t], { title: `Price Action`, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: {color: '#9ca3af'}, xaxis: {gridcolor: '#1f2937'}, yaxis: {gridcolor: '#1f2937'} });
            }

            // --- VIEW: 7. LIQUIDITY SWEEPS ---
            else if (currentTool === 'liq') {
                container.innerHTML = `
                    <h2 class="text-3xl font-extrabold text-white mb-2">Intraday Liquidity Sweeps</h2>
                    <p class="text-gray-400 mb-8">Monitors micro-structure 15m order flow to detect institutional fakeouts and traps.</p>
                    
                    <div class="bg-gray-900 p-10 rounded-2xl border border-gray-800 shadow-xl text-center max-w-2xl mx-auto">
                        <div class="text-gray-400 text-sm mb-4 font-bold uppercase tracking-wider">Current Market Micro-Structure</div>
                        <div class="text-3xl md:text-4xl font-extrabold text-yellow-400 mb-4">${s.liq_regime}</div>
                        <p class="text-gray-400 leading-relaxed max-w-lg mx-auto">
                            ${s.liq_regime.includes("SUPPLY") ? "Institutional algorithms are actively trapping retail breakout buyers at immediate resistance levels." : 
                              s.liq_regime.includes("DEMAND") ? "Institutional accumulation is absorbing retail panic selling at immediate support structures." : 
                              "No active institutional liquidity traps detected. The market is in standard price discovery."}
                        </p>
                    </div>
                `;
            }
        }

        // Initialize application properly on load
        window.onload = () => {
            initNav();      // 1. Draw the sidebar buttons
            loadAssets();   // 2. Fetch the data and render the default view
        };
    </script>
